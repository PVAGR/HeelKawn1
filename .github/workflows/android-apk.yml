name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "project.godot"
      - "export_presets.cfg"
      - "scenes/**"
      - "scripts/**"
      - "autoloads/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Install Godot export templates
        run: |
          set -e
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -q "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz" -O /tmp/export_templates.tpz
          unzip -q /tmp/export_templates.tpz -d /tmp/godot_templates
          cp -r /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.6.2.stable/

      - name: Prepare Godot Android editor settings
        run: |
          set -e
          mkdir -p ~/.config/godot
          keytool -genkeypair \
            -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "/usr/local/lib/android/sdk"
export/android/debug_keystore = ""
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
export/android/shutdown_adb_on_exit = true
EOF

      - name: Prime project import cache
        continue-on-error: true
        run: |
          timeout 30 godot --headless --path . -e

      - name: Export Android debug APK
        run: |
          set -e
          mkdir -p build/android
          godot --headless --path . --export-debug "Android" "build/android/HeelKawn-android.apk"
          ls -lah build/android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeelKawn-android-apk
          path: build/android/HeelKawn-android.apk

      - name: Publish/update Android latest release
        uses: ncipollo/release-action@v1
        with:
          tag: android-latest
          name: HeelKawn Android Latest
          body: |
            Automated Android APK build from main branch.
            Download and install on Android:
            HeelKawn-android.apk
          artifacts: build/android/HeelKawn-android.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
