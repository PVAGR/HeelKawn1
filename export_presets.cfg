; HeelKawn — Windows release export preset (Godot 4.6)
;
; Prereq: Editor → Manage Export Templates → download matching version, or mirror templates next to the editor.
;
; Release binary (preset name must match exactly):
;   godot --headless --path . --export-release "Windows Desktop" "dist/HeelKawn.exe"
;
; PowerShell (uses tools/godot/* console build when present):
;   $g = & .\tools\Resolve-Godot.ps1
;   New-Item -ItemType Directory -Force dist | Out-Null
;   & $g --headless --path $PWD --export-release "Windows Desktop" "dist/HeelKawn.exe"

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="dist/HeelKawn.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
seed=0
seed_entropy=0

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
application/modify_resources=true
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/export_angle=0
ssh_remote_deploy/enabled=false
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false
binary_format/embed_pck=true
codesign/identity=""
codesign/timestamp=true
application/product_name=""
application/file_description=""
application/company_name=""
application/product_version=""
application/file_version=""
